<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>مشهد اليوم | ننقل الخبر بسرعة ومصداقية</title>
<meta name="description" content="مشهد اليوم - بوابتك الإخبارية الشاملة لأخبار المغرب والعالم"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --red:#C8102E;--red-dark:#9B0C23;--red-light:#E8192E;
  --black:#111;--dark:#1C1C1C;--dark2:#0D1B2A;--dark3:#162032;
  --gray:#555;--gray-light:#888;--border:#E0E0E0;
  --bg:#F2F4F7;--white:#FFFFFF;--blue-dark:#0D2B45;--gold:#D4A017;
  --navy:#0D1B2A;--navy2:#162032;--navy3:#1E3A5F;
  --font-main:'Cairo','Tajawal',sans-serif;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-md:0 4px 20px rgba(0,0,0,0.14);
  --radius:4px;--radius-md:8px;--radius-lg:14px;
  --article-font-size:17px;--article-line-height:2;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-main);background:var(--bg);color:var(--dark);direction:rtl;text-align:right;line-height:1.6;font-size:15px;overflow-x:hidden;}
body.dark{--bg:#0f0f0f;--white:#1a1a1a;--dark:#e8e8e8;--dark2:#111;--border:#2a2a2a;--gray-light:#666;--gray:#999;}
body.dark .site-header{background:#1a1a1a!important;}
body.dark .news-card,body.dark .sub-card,body.dark .section-white,body.dark .sidebar-widget,body.dark .opinion-card{background:#1e1e1e!important;}
a{text-decoration:none;color:inherit;cursor:pointer;}
img{max-width:100%;display:block;}
ul{list-style:none;}
.container{max-width:1300px;margin:0 auto;padding:0 16px;}

/* ============================================================
   ANIMATED BACKGROUND
   ============================================================ */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;pointer-events:none;}
.bg-news-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;overflow:hidden;}
.bg-news-line{position:absolute;height:1px;width:100%;background:linear-gradient(90deg,transparent 0%,rgba(200,16,46,0.08) 30%,rgba(200,16,46,0.18) 50%,rgba(200,16,46,0.08) 70%,transparent 100%);animation:newsLineSweep linear infinite;}
@keyframes newsLineSweep{0%{transform:translateX(-200%);opacity:0;}10%{opacity:1;}90%{opacity:0.7;}100%{transform:translateX(200%);opacity:0;}}
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);animation:orbFloat 20s ease-in-out infinite;pointer-events:none;z-index:-1;}
.bg-orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(200,16,46,0.10) 0%,transparent 70%);top:-200px;right:-200px;animation-duration:22s;}
.bg-orb2{width:600px;height:600px;background:radial-gradient(circle,rgba(13,43,69,0.15) 0%,transparent 70%);bottom:-150px;left:-150px;animation-duration:28s;animation-delay:-10s;}
.bg-orb3{width:450px;height:450px;background:radial-gradient(circle,rgba(212,160,23,0.06) 0%,transparent 70%);top:40%;left:35%;animation-duration:35s;animation-delay:-18s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(40px,-50px) scale(1.06);}50%{transform:translate(-30px,30px) scale(0.94);}75%{transform:translate(20px,40px) scale(1.03);}}
.bg-grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;background-image:linear-gradient(rgba(200,16,46,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(200,16,46,0.018) 1px,transparent 1px);background-size:80px 80px;animation:gridScroll 50s linear infinite;}
@keyframes gridScroll{0%{background-position:0 0;}100%{background-position:80px 80px;}}

/* ============================================================
   READING BAR
   ============================================================ */
.reading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold));z-index:9999;width:0%;transition:width .1s linear;}

/* ============================================================
   TOP BAR
   ============================================================ */
.top-bar{background:var(--navy);color:#aaa;padding:5px 0;font-size:12px;}
.top-bar .inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.top-bar-left{display:flex;align-items:center;gap:16px;}
.top-bar-right{display:flex;align-items:center;gap:8px;}
.top-date{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.top-social a{color:#aaa;font-size:14px;transition:all .2s;padding:3px 5px;border-radius:4px;}
.top-social a:hover{color:#fff;transform:scale(1.15);}
.top-social a.fb:hover{color:#1877f2;}
.top-social a.ig:hover{color:#e1306c;}
.top-social a.wa:hover{color:#25d366;}
.top-social a.yt:hover{color:#ff0000;}
.top-social a.tg:hover{color:#0088cc;}

/* LANGUAGE SELECTOR - FIXED hover issue */
.lang-selector{position:relative;z-index:600;}
.lang-btn{background:transparent;border:1px solid #444;color:#ccc;padding:3px 10px;border-radius:3px;font-family:var(--font-main);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;}
.lang-btn:hover{border-color:var(--red);color:#fff;}
.lang-dropdown{
  display:none;
  position:absolute;
  top:100%;
  left:0;
  background:var(--navy);
  border:1px solid #333;
  border-radius:var(--radius);
  min-width:140px;
  z-index:999;
  box-shadow:var(--shadow-md);
  /* prevent gap between button and dropdown */
  padding-top:4px;
}
/* Invisible bridge to prevent dropdown from closing */
.lang-dropdown::before{
  content:'';
  display:block;
  height:4px;
  width:100%;
  position:absolute;
  top:-4px;
  left:0;
}
.lang-selector:hover .lang-dropdown{display:block;}
.lang-dropdown:hover{display:block;}
.lang-option{display:flex;align-items:center;gap:8px;padding:9px 14px;color:#ccc;font-size:13px;cursor:pointer;transition:background .15s;white-space:nowrap;}
.lang-option:hover{background:#1E3A5F;color:#fff;}
.lang-option.active{color:var(--red);}

.dark-toggle{background:none;border:none;color:#ccc;padding:3px 8px;border-radius:20px;font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.dark-toggle:hover{color:var(--gold);}
.admin-btn{background:none;border:1px solid var(--gold);color:var(--gold);padding:3px 8px;border-radius:3px;font-size:12px;cursor:pointer;transition:all .2s;display:none;}
.admin-btn:hover{background:var(--gold);color:#000;}
.admin-btn.visible{display:inline-flex;align-items:center;gap:5px;}

/* ============================================================
   HEADER
   ============================================================ */
.site-header{background:#fff;box-shadow:0 2px 16px rgba(0,0,0,0.1);position:sticky;top:0;z-index:500;}
body.dark .site-header{background:#1a1a1a!important;box-shadow:0 2px 16px rgba(0,0,0,0.4);}
.header-main{display:flex;align-items:center;justify-content:space-between;padding:10px 0;gap:16px;}

/* ============================================================
   LOGO - Camera Eye Professional
   ============================================================ */
.logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;}
.logo-svg-wrap{width:58px;height:58px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.logo-text-block{line-height:1.2;}
.logo-ar{font-size:22px;font-weight:900;color:var(--dark);line-height:1.1;letter-spacing:-0.5px;}
.logo-ar span{color:var(--red);}
.logo-en{font-size:9px;color:var(--gray-light);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.logo-tagline{font-size:10px;color:var(--gray-light);font-style:italic;}
body.dark .logo-ar{color:#e8e8e8;}

.hamburger{display:none;background:none;border:none;color:var(--dark);font-size:22px;cursor:pointer;padding:6px;flex-shrink:0;}
body.dark .hamburger{color:#e8e8e8;}
.search-wrap{flex:1;max-width:420px;position:relative;}
.search-form{display:flex;align-items:center;border:none;border-radius:32px;overflow:hidden;transition:all .25s;background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,0.08),inset 0 1px 3px rgba(0,0,0,0.05);}
body.dark .search-form{background:#2a2a2a;}
.search-form:focus-within{box-shadow:0 4px 20px rgba(0,0,0,0.12);transform:translateY(-1px);background:#fff;}
body.dark .search-form:focus-within{background:#333;}
.search-input{flex:1;border:none;outline:none;padding:10px 18px;font-family:var(--font-main);font-size:13px;background:transparent;direction:rtl;color:var(--dark);min-width:0;}
body.dark .search-input{color:#e8e8e8;}
.search-input::placeholder{color:#bbb;}
.search-btn{background:none;border:none;padding:10px 16px;color:var(--gray-light);cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0;display:flex;align-items:center;}
.search-btn:hover{color:var(--red);}

/* ============================================================
   BREAKING BAR
   ============================================================ */
.breaking-bar{background:linear-gradient(135deg,#b3001b,var(--red));color:#fff;padding:0;overflow:hidden;position:relative;z-index:100;height:38px;display:flex;align-items:center;box-shadow:0 2px 8px rgba(200,16,46,0.3);}
.breaking-inner{display:flex;align-items:center;width:100%;height:100%;}
.breaking-label{background:rgba(0,0,0,0.35);color:#fff;font-weight:900;font-size:11px;padding:0 14px;white-space:nowrap;display:flex;align-items:center;gap:7px;height:100%;flex-shrink:0;letter-spacing:1px;text-transform:uppercase;}
.breaking-label .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:blink 1s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);}}
.breaking-ticker{overflow:hidden;flex:1;height:100%;display:flex;align-items:center;padding:0 10px;}
.ticker-track{display:flex;gap:60px;animation:tickerRTL 60s linear infinite;white-space:nowrap;align-items:center;}
.ticker-track:hover{animation-play-state:paused;}
.ticker-item{font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;color:#fff;}
.ticker-item::before{content:'⚡';font-size:10px;}
@keyframes tickerRTL{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.ticker-source{font-size:9px;background:rgba(255,255,255,0.2);padding:1px 6px;border-radius:10px;margin-left:4px;}

/* ============================================================
   MAIN NAV
   ============================================================ */
.main-nav{background:var(--navy2);border-bottom:2px solid rgba(255,255,255,0.04);}
.nav-list{display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;}
.nav-list::-webkit-scrollbar{display:none;}
.nav-item>a{display:flex;align-items:center;gap:5px;padding:11px 14px;color:rgba(255,255,255,0.7);font-size:13px;font-weight:600;white-space:nowrap;transition:all .2s;border-bottom:3px solid transparent;cursor:pointer;}
.nav-item>a:hover,.nav-item.active>a{color:#fff;border-bottom-color:var(--red);background:rgba(255,255,255,0.04);}
.nav-item.home>a{color:var(--red);border-bottom-color:var(--red);}

/* ============================================================
   SIDEBAR NAV
   ============================================================ */
.sidebar-nav{position:fixed;top:0;right:-300px;width:280px;height:100vh;background:var(--navy);z-index:3000;transition:right .32s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-4px 0 30px rgba(0,0,0,0.4);}
.sidebar-nav.open{right:0;}
.snav-header{background:linear-gradient(135deg,var(--red),var(--red-dark));padding:18px 16px;display:flex;align-items:center;justify-content:space-between;}
.snav-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background .2s;}
.snav-close:hover{background:rgba(255,255,255,0.2);}
.snav-logo-text{color:#fff;font-size:18px;font-weight:900;}
.snav-logo-text span{opacity:0.8;}
.snav-search{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.snav-search input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:8px 14px;color:#fff;font-family:var(--font-main);font-size:13px;outline:none;direction:rtl;}
.snav-search input::placeholder{color:rgba(255,255,255,0.4);}
.snav-section-label{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;padding:12px 16px 4px;font-weight:700;}
.snav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;color:rgba(255,255,255,0.75);font-size:14px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.05);transition:all .2s;cursor:pointer;}
.snav-item:hover,.snav-item.active{color:#fff;background:rgba(255,255,255,0.06);border-right:3px solid var(--red);}
.snav-item i{width:20px;text-align:center;color:var(--red);font-size:14px;flex-shrink:0;}
.snav-divider{height:1px;background:rgba(255,255,255,0.06);margin:4px 0;}
.snav-footer{padding:16px;font-size:11px;color:rgba(255,255,255,0.3);text-align:center;border-top:1px solid rgba(255,255,255,0.06);}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:2999;}
.overlay-bg.show{display:block;}

/* SEARCH OVERLAY */
#searchOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:5000;overflow-y:auto;padding:60px 16px 40px;}
#searchOverlay.active{display:flex;align-items:flex-start;justify-content:center;}
.search-results-box{background:#fff;border-radius:var(--radius-lg);max-width:820px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
body.dark .search-results-box{background:#1e1e1e;}
.search-results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:3px solid var(--red);padding-bottom:12px;}
.search-result-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.search-result-item:hover .sri-title{color:var(--red);}
.search-result-item img{width:90px;height:65px;object-fit:cover;border-radius:var(--radius);flex-shrink:0;}
.sri-cat{font-size:10px;color:var(--red);font-weight:700;margin-bottom:3px;}
.sri-title{font-size:13px;font-weight:700;line-height:1.5;}
.sri-meta{font-size:11px;color:var(--gray-light);margin-top:4px;}
.no-results{text-align:center;padding:40px;color:var(--gray);}

/* ============================================================
   LAYOUT
   ============================================================ */
.page-layout{display:grid;grid-template-columns:1fr 300px;gap:22px;margin:20px 0;align-items:start;}
.main-col{min-width:0;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;border-bottom:3px solid var(--red);padding-bottom:8px;}
.section-title{font-size:16px;font-weight:900;color:var(--dark);display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';display:inline-block;width:4px;height:18px;background:var(--red);border-radius:2px;flex-shrink:0;}
.view-all{font-size:12px;color:var(--red);font-weight:700;display:flex;align-items:center;gap:4px;transition:gap .2s;white-space:nowrap;cursor:pointer;}
.view-all:hover{gap:8px;}
.section-white{background:#fff;border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
body.dark .section-white{background:#1e1e1e;}

/* ============================================================
   HERO GRID
   ============================================================ */
.hero-grid{display:grid;grid-template-columns:1fr 300px;grid-template-rows:auto auto;gap:12px;margin-bottom:20px;}
.hero-main{grid-row:1/3;position:relative;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;}
.hero-main img{width:100%;height:420px;object-fit:cover;transition:transform .5s;}
.hero-main:hover img{transform:scale(1.04);}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.88));padding:20px;border-radius:0 0 var(--radius-md) var(--radius-md);}
.hero-cat-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:2px;margin-bottom:8px;letter-spacing:.5px;}
.hero-title{font-size:20px;font-weight:900;color:#fff;line-height:1.4;margin-bottom:8px;}
.hero-meta{font-size:11px;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:10px;}
.hero-sub{display:flex;flex-direction:column;gap:12px;}
.sub-card{background:#fff;border-radius:var(--radius);overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
body.dark .sub-card{background:#1e1e1e;}
.sub-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.sub-card img{width:100%;height:130px;object-fit:cover;transition:transform .4s;}
.sub-card:hover img{transform:scale(1.05);}
.sub-card-body{padding:10px;}
.sub-card-cat{font-size:10px;color:var(--red);font-weight:700;margin-bottom:4px;}
.sub-card-title{font-size:13px;font-weight:700;line-height:1.5;}
.sub-card-meta{font-size:11px;color:var(--gray-light);margin-top:5px;}

/* ============================================================
   NEWS CARDS
   ============================================================ */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
.news-card{background:#fff;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;}
body.dark .news-card{background:#1e1e1e;}
.news-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
.news-card img{width:100%;height:180px;object-fit:cover;transition:transform .4s;}
.news-card:hover img{transform:scale(1.05);}
.news-card-body{padding:12px;}
.news-cat-tag{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:900;padding:2px 8px;border-radius:2px;margin-bottom:8px;letter-spacing:.5px;}
.news-card-title{font-size:14px;font-weight:700;line-height:1.5;color:var(--dark);margin-bottom:8px;}
.news-card-meta{font-size:11px;color:var(--gray-light);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.badge-breaking{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#b3001b,#e00020);color:#fff;font-size:9px;font-weight:900;padding:2px 8px;border-radius:10px;letter-spacing:.5px;animation:badgePulse 2s ease infinite;}
@keyframes badgePulse{0%,100%{box-shadow:0 2px 8px rgba(200,16,46,0.4);}50%{box-shadow:0 2px 16px rgba(200,16,46,0.7);}}

/* ============================================================
   CAT SECTION
   ============================================================ */
.cat-section-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;}
.cat-section-main{position:relative;cursor:pointer;overflow:hidden;}
.cat-section-main img{width:100%;height:320px;object-fit:cover;display:block;transition:transform .4s;}
.cat-section-main:hover img{transform:scale(1.04);}
.cat-section-overlay{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(0,0,0,0.85));display:flex;flex-direction:column;justify-content:flex-end;padding:16px;}
.cat-section-list{background:#fff;display:flex;flex-direction:column;}
body.dark .cat-section-list{background:#1e1e1e;}
.list-card{display:flex;gap:12px;padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.list-card:hover{background:rgba(200,16,46,0.04);}
.list-card:last-child{border-bottom:none;}
.list-card-img{width:80px;height:58px;object-fit:cover;border-radius:var(--radius);flex-shrink:0;}
.list-card-body{flex:1;min-width:0;}
.list-card-cat{font-size:10px;color:var(--red);font-weight:700;margin-bottom:3px;}
.list-card-title{font-size:13px;font-weight:700;line-height:1.45;}
.list-card-meta{font-size:11px;color:var(--gray-light);margin-top:4px;}

/* TWO COL */
.two-col-sec{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}

/* OPINION */
.opinion-card{background:#fff;border-radius:var(--radius-md);padding:18px;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column;gap:12px;transition:transform .2s;}
body.dark .opinion-card{background:#1e1e1e;}
.opinion-card:hover{transform:translateY(-3px);}
.opinion-author{display:flex;align-items:center;gap:10px;}
.opinion-author img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--red);flex-shrink:0;}
.opinion-author-name{font-size:14px;font-weight:800;}
.opinion-author-role{font-size:11px;color:var(--gray);}
.opinion-title{font-size:15px;font-weight:700;line-height:1.55;color:var(--dark);}
.opinion-excerpt{font-size:13px;color:var(--gray);line-height:1.7;}
.opinion-meta{font-size:11px;color:var(--gray-light);}

/* ============================================================
   SIDEBAR WIDGETS
   ============================================================ */
.sidebar{min-width:0;}
.sidebar-widget{background:#fff;border-radius:var(--radius-md);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow);}
body.dark .sidebar-widget{background:#1e1e1e;}
.widget-title{background:var(--navy2);color:#fff;font-size:13px;font-weight:700;padding:10px 14px;display:flex;align-items:center;gap:8px;}
.widget-title i{color:var(--red);}

/* WEATHER WIDGET */
.weather-widget{background:linear-gradient(135deg,#0a1628,#162032)!important;color:#fff!important;}
.weather-widget .widget-title{background:rgba(0,0,0,0.3)!important;border-bottom:1px solid rgba(255,255,255,0.08);}
.weather-city-selector{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.08);}
.wcity-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);padding:3px 9px;border-radius:12px;font-family:var(--font-main);font-size:11px;cursor:pointer;transition:all .2s;font-weight:600;}
.wcity-btn:hover,.wcity-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.weather-main-block{padding:14px;text-align:center;}
.weather-temp{font-size:64px;font-weight:900;color:#fff;line-height:1;}
.weather-temp span{font-size:26px;vertical-align:top;margin-top:10px;display:inline-block;font-weight:400;}
.weather-desc{font-size:14px;color:rgba(255,255,255,0.8);margin:6px 0 12px;}
.weather-feel{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:10px;}
.weather-details{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 12px 12px;}
.weather-detail{background:rgba(255,255,255,0.07);border-radius:8px;padding:8px 10px;font-size:11px;color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:6px;}
.weather-detail i{color:var(--red);font-size:12px;flex-shrink:0;}
.weather-live-time{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;padding:4px;letter-spacing:1px;}
.weather-tabs{display:flex;gap:4px;padding:0 12px 8px;overflow-x:auto;scrollbar-width:none;}
.weather-tabs::-webkit-scrollbar{display:none;}
.wtab{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);padding:4px 8px;border-radius:8px;font-family:var(--font-main);font-size:10px;cursor:pointer;transition:all .2s;font-weight:700;white-space:nowrap;flex-shrink:0;}
.wtab:hover,.wtab.active{background:var(--red);border-color:var(--red);color:#fff;}
.weather-day-detail{padding:8px 12px;}
.wdd-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:rgba(255,255,255,0.75);padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.wdd-row:last-child{border-bottom:none;}
.wdd-row span:first-child{color:rgba(255,255,255,0.5);}

/* Most read */
.most-read-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.most-read-item:hover{background:rgba(200,16,46,0.03);}
.most-read-item:last-child{border-bottom:none;}
.most-read-num{font-size:22px;font-weight:900;color:rgba(200,16,46,0.15);width:30px;flex-shrink:0;line-height:1;}
.most-read-title{font-size:13px;font-weight:700;line-height:1.45;color:var(--dark);}
.most-read-meta{font-size:11px;color:var(--gray-light);margin-top:4px;}
.tags-cloud{display:flex;flex-wrap:wrap;gap:6px;padding:12px;}
.tag-item{background:var(--bg);border:1px solid var(--border);color:var(--gray);font-size:11px;font-weight:600;padding:4px 10px;border-radius:12px;cursor:pointer;transition:all .2s;}
.tag-item:hover{background:var(--red);border-color:var(--red);color:#fff;}

/* ============================================================
   ARTICLE PAGE
   ============================================================ */
.article-cat-tag{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:11px;font-weight:900;padding:4px 14px;border-radius:2px;margin-bottom:12px;}
.article-title{font-size:28px;font-weight:900;color:var(--dark);line-height:1.45;margin-bottom:16px;}
.article-meta-bar{display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px;}
.article-date{font-size:12px;color:var(--gray-light);display:flex;align-items:center;gap:5px;}
.article-views{font-size:12px;color:var(--gray-light);display:flex;align-items:center;gap:5px;}
.article-hero-img{width:100%;border-radius:var(--radius-md);margin-bottom:6px;max-height:480px;object-fit:cover;}
.article-img-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;}
.article-img-gallery img{width:100%;height:160px;object-fit:cover;border-radius:var(--radius);cursor:pointer;}
.article-img-caption{font-size:11px;color:var(--gray-light);text-align:center;margin-bottom:20px;font-style:italic;}
.article-body{font-size:var(--article-font-size);line-height:var(--article-line-height);color:var(--dark);}
.article-body p{margin-bottom:20px;}
.article-body h2{font-size:20px;font-weight:900;color:var(--red);margin:28px 0 14px;padding-right:14px;border-right:4px solid var(--red);}
.article-body h3{font-size:18px;font-weight:800;color:var(--navy);margin:22px 0 12px;padding-right:10px;border-right:3px solid var(--gold);}
body.dark .article-body h3{color:var(--gold);}
.article-body strong{color:var(--red);font-weight:800;}
.article-body blockquote{border-right:4px solid var(--gold);padding:14px 18px;background:rgba(212,160,23,0.06);border-radius:0 var(--radius) var(--radius) 0;margin:20px 0;font-style:italic;}
.share-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:24px 0;}
.share-label{font-size:13px;font-weight:700;}
.share-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-main);transition:transform .2s;}
.share-btn:hover{transform:scale(1.05);}
.share-fb{background:#1877f2;color:#fff;}
.share-wa{background:#25d366;color:#fff;}
.share-tg{background:#0088cc;color:#fff;}
.share-copy{background:var(--dark2);color:#fff;}
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:12px;}

/* ============================================================
   COMMENTS SECTION
   ============================================================ */
.comments-section{background:#fff;border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);margin-top:28px;}
body.dark .comments-section{background:#1e1e1e;}
.comments-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:14px;border-bottom:3px solid var(--red);}
.comments-header-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--red),var(--red-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.comments-header-icon i{color:#fff;font-size:18px;}
.comments-title{font-size:18px;font-weight:900;color:var(--dark);}
.comments-subtitle{font-size:12px;color:var(--gray);}
.comment-form{background:linear-gradient(135deg,rgba(200,16,46,0.03),rgba(13,43,69,0.03));border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;margin-bottom:24px;}
body.dark .comment-form{background:rgba(255,255,255,0.03);border-color:#2a2a2a;}
.comment-form-title{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.comment-form-title i{color:var(--red);}
.comment-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.comment-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-family:var(--font-main);font-size:13px;outline:none;transition:border-color .2s;background:#fff;color:var(--dark);direction:rtl;}
body.dark .comment-input{background:#2a2a2a;border-color:#333;color:#e0e0e0;}
.comment-input:focus{border-color:var(--red);}
.comment-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-family:var(--font-main);font-size:13px;outline:none;resize:vertical;min-height:100px;margin-bottom:12px;transition:border-color .2s;background:#fff;color:var(--dark);direction:rtl;}
body.dark .comment-textarea{background:#2a2a2a;border-color:#333;color:#e0e0e0;}
.comment-textarea:focus{border-color:var(--red);}
.comment-submit{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;border:none;border-radius:var(--radius);padding:10px 24px;font-family:var(--font-main);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.comment-submit:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(200,16,46,0.3);}
.reactions-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.reactions-label{font-size:13px;font-weight:700;color:var(--dark);}
.react-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;font-family:var(--font-main);}
.react-btn:hover{transform:scale(1.05);}
.react-btn.active{border-color:var(--red);background:rgba(200,16,46,0.06);}
.react-count{font-size:12px;font-weight:700;color:var(--gray);}
.comments-list{display:flex;flex-direction:column;gap:14px;}
.comment-item{background:var(--bg);border-radius:var(--radius-md);padding:14px;border-right:3px solid transparent;transition:border-color .2s;}
body.dark .comment-item{background:#111;}
.comment-item:hover{border-right-color:var(--red);}
.comment-item-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.comment-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--navy));display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:900;flex-shrink:0;}
.comment-user-name{font-size:14px;font-weight:800;color:var(--dark);}
.comment-user-date{font-size:11px;color:var(--gray-light);}
.comment-text{font-size:14px;line-height:1.7;color:var(--dark);}
.comment-like-btn{background:none;border:none;color:var(--gray-light);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:10px;transition:all .2s;font-family:var(--font-main);margin-top:6px;}
.comment-like-btn:hover{background:rgba(200,16,46,0.08);color:var(--red);}
.comments-empty{text-align:center;padding:30px;color:var(--gray);font-size:14px;}
.comments-empty i{font-size:36px;opacity:0.3;margin-bottom:10px;display:block;}

/* CAT BANNER */
.cat-banner{position:relative;border-radius:var(--radius-md);overflow:hidden;margin-bottom:20px;height:200px;}
.cat-banner img{width:100%;height:100%;object-fit:cover;}
.cat-banner-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.75),rgba(0,0,0,0.3));display:flex;flex-direction:column;justify-content:center;align-items:flex-end;padding:24px;}
.cat-banner-title{font-size:28px;font-weight:900;color:#fff;display:flex;align-items:center;gap:12px;}
.cat-banner-count{font-size:13px;color:rgba(255,255,255,0.7);margin-top:6px;}

/* ============================================================
   WEATHER PAGE — PROFESSIONAL
   ============================================================ */
.weather-page-header{background:linear-gradient(135deg,#0a1628,#162032);border-radius:var(--radius-lg);padding:24px;color:#fff;margin-bottom:20px;position:relative;overflow:hidden;}
.weather-page-header::before{content:'';position:absolute;top:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(200,16,46,0.15),transparent 70%);border-radius:50%;}
.weather-city-name{font-size:16px;font-weight:900;opacity:.7;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.weather-main-temp{font-size:88px;font-weight:900;line-height:1;letter-spacing:-3px;}
.weather-main-desc{font-size:16px;opacity:.8;margin:8px 0;}
.weather-feels-like{font-size:13px;opacity:.5;}
.weather-hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}

/* Sun Arc */
.sun-arc-card{background:#fff;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}
body.dark .sun-arc-card{background:#1e1e1e;}
.sun-arc-title{font-size:14px;font-weight:900;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--red);display:flex;align-items:center;gap:8px;}
.sun-arc-times{display:flex;justify-content:space-around;margin-top:14px;}
.sun-arc-time{text-align:center;}
.sun-arc-time .icon{font-size:22px;margin-bottom:4px;}
.sun-arc-time .val{font-size:14px;font-weight:900;}
.sun-arc-time .lbl{font-size:11px;color:var(--gray);}

/* 7-day forecast */
.forecast-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px;}
.forecast-day-card{background:#fff;border-radius:var(--radius-md);padding:12px 6px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s;border:2px solid transparent;}
body.dark .forecast-day-card{background:#1e1e1e;}
.forecast-day-card.active{border-color:var(--red);background:rgba(200,16,46,0.04);}
.forecast-day-card:hover{transform:translateY(-2px);}
.forecast-day-name{font-size:11px;font-weight:800;color:var(--gray);margin-bottom:4px;}
.forecast-day-date{font-size:9px;color:var(--gray-light);margin-bottom:4px;}
.forecast-day-icon{font-size:24px;margin:4px 0;}
.forecast-day-temps{font-size:12px;font-weight:700;}
.forecast-day-temps span{color:var(--gray-light);}
.forecast-day-rain{font-size:10px;color:#1976d2;margin-top:3px;}

/* Hourly scroll */
.hourly-scroll-wrap{background:#fff;border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);margin-bottom:20px;}
body.dark .hourly-scroll-wrap{background:#1e1e1e;}
.hourly-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;}
.hourly-item{background:var(--bg);border-radius:10px;padding:10px 8px;text-align:center;flex-shrink:0;min-width:72px;}
body.dark .hourly-item{background:#111;}
.hourly-time{font-size:11px;color:var(--gray-light);margin-bottom:4px;}
.hourly-icon{font-size:22px;}
.hourly-temp{font-size:15px;font-weight:900;}
.hourly-rain{font-size:10px;color:#1976d2;margin-top:3px;}

/* Weather detail grid */
.wx-detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.wx-detail-card{background:#fff;border-radius:var(--radius-md);padding:16px;text-align:center;box-shadow:var(--shadow);}
body.dark .wx-detail-card{background:#1e1e1e;}
.wx-detail-icon{font-size:24px;margin-bottom:8px;}
.wx-detail-val{font-size:20px;font-weight:900;}
.wx-detail-lbl{font-size:11px;color:var(--gray);margin-top:4px;}
.wx-detail-sub{font-size:11px;color:var(--gray-light);margin-top:2px;}

/* UV bar */
.uv-bar-wrap{background:linear-gradient(to right,#4caf50,#ffeb3b,#ff9800,#f44336,#9c27b0);border-radius:3px;height:8px;margin:6px 0;position:relative;}
.uv-indicator{position:absolute;top:-3px;width:14px;height:14px;background:#fff;border-radius:50%;border:2px solid #333;transform:translateX(-50%);}

/* AQI widget */
.aqi-card{background:linear-gradient(135deg,#0a1628,#162032);border-radius:var(--radius-lg);padding:20px;color:#fff;margin-bottom:20px;}
.aqi-val{font-size:48px;font-weight:900;line-height:1;}
.aqi-label{font-size:14px;opacity:.8;margin-top:4px;}
.aqi-bars-row{display:flex;gap:6px;margin:10px 0;}
.aqi-bar{flex:1;height:8px;border-radius:3px;opacity:0.4;}
.aqi-bar.active{opacity:1;}
.aqi-pollutants{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.aqi-poll-item{background:rgba(255,255,255,0.08);border-radius:8px;padding:8px;font-size:11px;text-align:center;}
.aqi-poll-name{font-weight:900;margin-bottom:2px;}

/* Climate table */
.climate-table{width:100%;border-collapse:collapse;font-size:13px;}
.climate-table th{background:var(--navy2);color:#fff;padding:10px 8px;text-align:center;font-weight:700;font-size:12px;}
.climate-table td{padding:8px;text-align:center;border-bottom:1px solid var(--border);}
.climate-table tr:hover td{background:rgba(200,16,46,0.03);}
.temp-bar{background:#eee;border-radius:3px;height:8px;overflow:hidden;min-width:60px;}
.temp-bar-fill{background:linear-gradient(to right,#3b82f6,#ef4444);height:100%;border-radius:3px;}

/* Weather day details */
.day-details-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.day-period-card{border-radius:10px;padding:16px;text-align:center;}
.day-period-icon{font-size:24px;margin-bottom:6px;}
.day-period-temp{font-size:20px;font-weight:900;}
.day-period-lbl{font-size:12px;color:var(--gray);}

/* Weather tips */
.weather-tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.weather-tip{border-radius:10px;padding:14px;font-size:13px;}
.weather-tip-icon{font-size:22px;margin-bottom:6px;}
.weather-tip-title{font-weight:700;margin-bottom:4px;}
.weather-tip-desc{font-size:12px;color:var(--gray);}

/* Live clock badge */
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--gray);background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);border-radius:20px;padding:3px 10px;}
.live-dot{width:7px;height:7px;background:#4caf50;border-radius:50%;animation:blink 1.5s infinite;flex-shrink:0;}

/* ============================================================
   ADMIN MODAL
   ============================================================ */
#adminModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:8000;align-items:center;justify-content:center;}
#adminModal.active{display:flex;}
.admin-modal-box{background:#fff;border-radius:var(--radius-lg);padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;}
body.dark .admin-modal-box{background:#1e1e1e;}
.admin-modal-title{font-size:20px;font-weight:900;margin-bottom:6px;color:var(--dark);}
.admin-modal-sub{font-size:13px;color:var(--gray);margin-bottom:20px;}
.admin-field{margin-bottom:14px;}
.admin-field label{display:block;font-size:12px;font-weight:700;color:var(--dark);margin-bottom:5px;}
.admin-field input{width:100%;border:2px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-family:var(--font-main);font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:var(--dark);}
body.dark .admin-field input{background:#2a2a2a;border-color:#333;color:#e0e0e0;}
.admin-field input:focus{border-color:var(--red);}
.admin-login-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:var(--radius);padding:12px;font-family:var(--font-main);font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;}
.admin-login-btn:hover{background:var(--red-dark);}
.admin-err{color:var(--red);font-size:13px;margin-top:8px;text-align:center;}
.admin-modal-close{position:absolute;top:14px;left:14px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);}

/* ============================================================
   ADMIN DASHBOARD
   ============================================================ */
#adminDash{display:none;position:fixed;inset:0;background:var(--bg);z-index:9000;overflow-y:auto;}
#adminDash.active{display:block;}
.dash-header{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.dash-header h1{font-size:18px;font-weight:900;}
.dash-close-btn{background:var(--red);border:none;color:#fff;padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-main);font-weight:700;font-size:13px;}
.dash-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;background:#fff;flex-wrap:nowrap;}
body.dark .dash-tabs{background:#1e1e1e;}
.dash-tab{padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;color:var(--gray);font-family:var(--font-main);transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;display:flex;align-items:center;gap:6px;}
.dash-tab.active{color:var(--red);border-bottom-color:var(--red);}
.dash-panel{display:none;}
.dash-panel.active{display:block;}
.dash-body{max-width:1100px;margin:0 auto;padding:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--dark);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;border:2px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-family:var(--font-main);font-size:14px;outline:none;transition:border-color .2s;background:#fff;color:var(--dark);direction:rtl;}
body.dark .form-group input,body.dark .form-group textarea,body.dark .form-group select{background:#2a2a2a;border-color:#333;color:#e0e0e0;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--red);}
.form-group textarea{resize:vertical;min-height:140px;}
.form-hint{font-size:11px;color:var(--gray-light);margin-top:4px;}
.btn-primary{background:var(--red);color:#fff;border:none;border-radius:var(--radius);padding:10px 22px;font-family:var(--font-main);font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary:hover{background:var(--red-dark);}
.btn-secondary{background:var(--dark2);color:#fff;border:none;border-radius:var(--radius);padding:10px 22px;font-family:var(--font-main);font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-danger{background:#e53935;color:#fff;border:none;border-radius:var(--radius);padding:6px 14px;font-family:var(--font-main);font-size:12px;font-weight:700;cursor:pointer;}
.btn-edit{background:#1565c0;color:#fff;border:none;border-radius:var(--radius);padding:6px 14px;font-family:var(--font-main);font-size:12px;font-weight:700;cursor:pointer;}
.img-upload-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px;}
.img-upload-slot{border:2px dashed var(--border);border-radius:var(--radius);padding:12px;text-align:center;min-height:80px;}
.img-upload-slot label{font-size:10px;color:var(--gray-light);display:block;margin-bottom:4px;}
.img-upload-slot i{font-size:20px;color:var(--border);display:block;margin-bottom:4px;}
.img-upload-slot input{font-size:12px!important;}
.social-links-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
.social-field{display:flex;align-items:center;gap:8px;border:2px solid var(--border);border-radius:var(--radius);padding:8px 12px;background:#fff;transition:border-color .2s;}
body.dark .social-field{background:#2a2a2a;border-color:#333;}
.social-field:focus-within{border-color:var(--red);}
.social-field i{font-size:18px;flex-shrink:0;width:22px;text-align:center;}
.social-field.fb i{color:#1877f2;}.social-field.ig i{color:#e1306c;}.social-field.wa i{color:#25d366;}.social-field.yt i{color:#ff0000;}.social-field.tg i{color:#0088cc;}.social-field.tw i{color:#1da1f2;}
.social-field input{border:none!important;padding:0!important;outline:none;flex:1;font-size:13px;background:transparent;direction:rtl;color:var(--dark);}
body.dark .social-field input{color:#e0e0e0;}
.pages-list{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
.page-editor-item{background:#fff;border:2px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
body.dark .page-editor-item{background:#1e1e1e;border-color:#2a2a2a;}
.page-editor-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);cursor:pointer;font-weight:700;font-size:14px;}
body.dark .page-editor-header{background:#111;}
.page-editor-body{padding:16px;display:none;}
.page-editor-body.open{display:block;}
.news-manage-item{display:flex;gap:12px;padding:12px;background:#fff;border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);align-items:center;}
body.dark .news-manage-item{background:#1e1e1e;}
.news-manage-img{width:80px;height:55px;object-fit:cover;border-radius:var(--radius);flex-shrink:0;}
.news-manage-title{flex:1;font-size:13px;font-weight:700;min-width:0;}
.news-manage-meta{font-size:11px;color:var(--gray-light);margin-top:3px;}
.news-manage-actions{display:flex;gap:6px;flex-shrink:0;}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:var(--radius-md);padding:16px;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--red);}
body.dark .stat-card{background:#1e1e1e;}
.stat-num{font-size:28px;font-weight:900;color:var(--red);}
.stat-label{font-size:12px;color:var(--gray);}

/* ============================================================
   STATIC PAGES — PROFESSIONAL
   ============================================================ */
.static-page{max-width:900px;margin:0 auto;padding:30px 0;}
.static-hero{background:linear-gradient(135deg,var(--navy),var(--navy3));border-radius:var(--radius-lg);padding:48px 40px;margin-bottom:30px;text-align:center;color:#fff;position:relative;overflow:hidden;}
.static-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 50%,rgba(200,16,46,0.2),transparent 60%);}
.static-hero-icon{font-size:52px;color:var(--red);margin-bottom:16px;display:block;position:relative;}
.static-hero h1{font-size:30px;font-weight:900;margin-bottom:8px;position:relative;}
.static-hero p{font-size:14px;opacity:.7;position:relative;}
.static-section{background:#fff;border-radius:var(--radius-md);padding:24px;box-shadow:var(--shadow);margin-bottom:16px;}
body.dark .static-section{background:#1e1e1e;}
.static-section h3{font-size:16px;font-weight:900;color:var(--red);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;}
.static-section p,.static-section li{font-size:14px;line-height:1.85;color:var(--gray);}
.static-section ul{padding-right:16px;margin-top:8px;}
.static-section ul li{margin-bottom:8px;list-style:disc;}
.static-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px;}
.static-info-card{background:var(--bg);border-radius:var(--radius-md);padding:18px;display:flex;gap:14px;align-items:flex-start;}
body.dark .static-info-card{background:#111;}
.static-info-card i{font-size:24px;color:var(--red);flex-shrink:0;margin-top:2px;}
.static-info-card h4{font-size:14px;font-weight:800;margin-bottom:4px;}
.static-info-card p{font-size:13px;color:var(--gray);line-height:1.6;}
.static-timeline{margin-top:14px;position:relative;padding-right:24px;}
.static-timeline::before{content:'';position:absolute;right:7px;top:0;bottom:0;width:2px;background:var(--border);}
.timeline-item{position:relative;padding-right:20px;margin-bottom:20px;}
.timeline-dot{position:absolute;right:-24px;top:4px;width:14px;height:14px;background:var(--red);border-radius:50%;border:3px solid #fff;}
body.dark .timeline-dot{border-color:#1e1e1e;}
.timeline-year{font-size:11px;font-weight:900;color:var(--red);margin-bottom:4px;}
.timeline-text{font-size:14px;line-height:1.7;color:var(--gray);}
.static-team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:14px;}
.team-card{background:var(--bg);border-radius:var(--radius-md);padding:20px;text-align:center;}
body.dark .team-card{background:#111;}
.team-card img{width:72px;height:72px;border-radius:50%;object-fit:cover;margin:0 auto 12px;border:3px solid var(--red);}
.team-card h4{font-size:15px;font-weight:800;margin-bottom:4px;}
.team-card p{font-size:12px;color:var(--gray);}
.privacy-points{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.privacy-point{display:flex;gap:10px;align-items:flex-start;background:var(--bg);border-radius:var(--radius);padding:12px;}
body.dark .privacy-point{background:#111;}
.privacy-point i{color:var(--red);flex-shrink:0;margin-top:2px;font-size:16px;}
.privacy-point p{font-size:13px;color:var(--gray);line-height:1.6;}
.terms-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.terms-item{display:flex;gap:12px;align-items:flex-start;padding:14px;background:var(--bg);border-radius:var(--radius);}
body.dark .terms-item{background:#111;}
.terms-num{width:28px;height:28px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900;flex-shrink:0;}
.terms-text{font-size:13px;color:var(--gray);line-height:1.7;}
.contact-cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px;}
.contact-card{background:var(--bg);border-radius:var(--radius-md);padding:20px;text-align:center;}
body.dark .contact-card{background:#111;}
.contact-card i{font-size:32px;color:var(--red);margin-bottom:10px;display:block;}
.contact-card h4{font-size:14px;font-weight:800;margin-bottom:6px;}
.contact-card p{font-size:13px;color:var(--gray);}

/* ============================================================
   FOOTER
   ============================================================ */
.site-footer{background:var(--navy);color:#aaa;margin-top:36px;}
.footer-main{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:28px;padding:36px 0 26px;}
.footer-about p{font-size:13px;line-height:1.8;margin:12px 0;color:#888;}
.footer-social{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.footer-social a{width:36px;height:36px;background:#1E3A5F;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:14px;transition:all .2s;}
.footer-social a:hover{background:var(--red);color:#fff;transform:scale(1.1);}
.footer-col h4{color:#fff;font-size:14px;font-weight:800;margin-bottom:14px;padding-bottom:7px;border-bottom:2px solid var(--red);}
.footer-links{display:flex;flex-direction:column;gap:8px;}
.footer-links a{font-size:13px;color:#888;transition:color .2s;display:flex;align-items:center;gap:6px;cursor:pointer;}
.footer-links a:hover{color:var(--red);}
.footer-links a::before{content:'◂';font-size:10px;color:var(--red);}
.footer-bottom{border-top:1px solid #1E3A5F;padding:16px 0;}
.footer-bottom-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:12px;}
.footer-bottom-links{display:flex;gap:14px;flex-wrap:wrap;}
.footer-bottom-links a{color:#666;transition:color .2s;cursor:pointer;}
.footer-bottom-links a:hover{color:var(--red);}
.footer-disclaimer{text-align:center;padding:10px 0;border-top:1px solid #1E3A5F;font-size:11px;color:#555;line-height:1.7;}
.footer-logo-wrap{display:flex;align-items:center;gap:8px;}
.footer-logo-text{color:#fff;font-size:18px;font-weight:900;}
.footer-logo-text span{color:var(--red);}

/* TOAST */
.toast{position:fixed;bottom:80px;right:20px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:600;z-index:9999;box-shadow:var(--shadow-md);transform:translateX(200%);transition:transform .3s;max-width:300px;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateX(0);}

/* SCROLL TOP */
.scroll-top{position:fixed;bottom:24px;right:20px;width:42px;height:42px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(200,16,46,0.4);transition:all .3s;z-index:999;}
.scroll-top.show{display:flex;}
.scroll-top:hover{transform:translateY(-3px);}

/* ADSENSE */
.adsense-slot{width:100%;overflow:hidden;border-radius:var(--radius);margin:12px 0;background:rgba(0,0,0,0.02);border:1px dashed rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;min-height:90px;position:relative;}
body.dark .adsense-slot{background:rgba(255,255,255,0.02);border-color:rgba(255,255,255,0.06);}
.adsense-label{position:absolute;top:3px;right:6px;font-size:9px;color:var(--gray-light);}
.adsense-leaderboard{min-height:90px;}
.adsense-rectangle{min-height:250px;}

/* TRANSLATE OVERLAY */
#translateOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:8000;align-items:center;justify-content:center;}
#translateOverlay.active{display:flex;}
.translate-box{background:#fff;border-radius:var(--radius-lg);padding:28px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
body.dark .translate-box{background:#1e1e1e;}
.translate-spinner{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ============================================================
   RESPONSIVE — FULLY MOBILE
   ============================================================ */
@media(max-width:1100px){
  .page-layout{grid-template-columns:1fr;}
  .sidebar{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .footer-main{grid-template-columns:1fr 1fr;}
  .dash-stats{grid-template-columns:repeat(2,1fr);}
  .wx-detail-grid{grid-template-columns:repeat(2,1fr);}
  .weather-hero-grid{grid-template-columns:1fr;}
  .forecast-strip{grid-template-columns:repeat(7,1fr);}
  .static-team-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:900px){
  .forecast-strip{grid-template-columns:repeat(4,1fr);}
  .weather-tips-grid{grid-template-columns:1fr 1fr;}
  .static-info-grid{grid-template-columns:1fr;}
  .privacy-points{grid-template-columns:1fr;}
}
@media(max-width:768px){
  .hero-grid{grid-template-columns:1fr;}
  .hero-main img{height:260px;}
  .hero-sub{display:none;}
  .news-grid{grid-template-columns:1fr 1fr;}
  .cat-section-grid{grid-template-columns:1fr;}
  .cat-section-main img{height:200px;}
  .sidebar{grid-template-columns:1fr;}
  .footer-main{grid-template-columns:1fr 1fr;}
  .hamburger{display:block;}
  .main-nav{display:none;}
  .top-date{display:none;}
  .search-wrap{max-width:200px;}
  .article-title{font-size:20px;}
  .two-col-sec{grid-template-columns:1fr!important;}
  .cat-banner{height:150px;}
  .cat-banner-title{font-size:22px;}
  .related-grid{grid-template-columns:1fr 1fr;}
  .comment-inputs{grid-template-columns:1fr;}
  .wx-detail-grid{grid-template-columns:1fr 1fr;}
  .day-details-grid{grid-template-columns:1fr;}
  .weather-tips-grid{grid-template-columns:1fr;}
  .static-team-grid{grid-template-columns:1fr;}
  .contact-cards-grid{grid-template-columns:1fr;}
  .social-links-grid{grid-template-columns:1fr;}
  .dash-stats{grid-template-columns:repeat(2,1fr);}
  .static-info-grid{grid-template-columns:1fr;}
  .img-upload-grid{grid-template-columns:1fr;}
  .weather-page-header{padding:16px;}
  .weather-main-temp{font-size:64px;}
}
@media(max-width:540px){
  .news-grid{grid-template-columns:1fr;}
  .sidebar{grid-template-columns:1fr;}
  .footer-main{grid-template-columns:1fr;}
  .logo-ar{font-size:18px;}
  .search-wrap{max-width:130px;}
  .header-main{gap:8px;}
  .dash-stats{grid-template-columns:1fr 1fr;}
  .forecast-strip{grid-template-columns:repeat(3,1fr);}
  .wx-detail-grid{grid-template-columns:1fr 1fr;}
  .related-grid{grid-template-columns:1fr;}
  .static-hero h1{font-size:20px;}
  .article-title{font-size:18px;}
  .weather-main-temp{font-size:52px;}
  .aqi-pollutants{grid-template-columns:1fr 1fr;}
}
</style>
